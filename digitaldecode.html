    <script>

        var map = L.map('map', {
            center: [40.0583, 74.4057],
            zoom: 10,
            layers: [CartoDB_Positron]  // Be sure this is in basemaps.js
        });
        
        // Add a scale control to the lower right corner of the map
        L.control.scale({position:'bottomright'}).addTo(map);
        
        // Define the overLays object, for use in the layer control
        var overLays = {
        };

        L.control.layers(baseMaps, overLays, {collapsed: false}).addTo(map);
