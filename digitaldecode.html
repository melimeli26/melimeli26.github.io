
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="author" content="Jane A. Student">
    <meta name="description" content="A Leaflet map of Chicago public murals">
        
    <title>Mental Health Resources in NJ </title>  
     
    <!-- Style sheet for Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- JavaScript source for Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
           
    <!-- Leaflet legend plugin (code stored locally)-->
    <!-- From here: https://github.com/ptma/Leaflet.Legend -->
    <link rel="stylesheet" href="utilities/leaflet.legend.css" />
    <script type="text/javascript" src="utilities/leaflet.legend.js"></script>
    
    <!-- Other external code sources -->   
    <script src="basemaps.js"></script>     <!-- Basemaps -->

	 <!-- Added link to Community Data geojson-->
    <script src="Communitymap_GJ.js"></script> 
    
    <!-- Define styles for the document and the map -->
	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
        #map {
            width: 100%;
            height: 80%;
        }
        #text_area {
            padding: 5px;
			align: center;
            font-family: Arial, Helvetica, sans-serif;
        }
	</style> 

</head>

<body>  
 
    <div id="map"></div>   
    <div id="text_area">
        <h3> MENTAL HEALTH RESOURCES
            BY DIGITAL DECODE  </h3>
    </div> 

    <script> 

        // Initialize the map
        var map = L.map('map', {
            center: [40.89, -74.17],
            zoom: 10,
            layers: [CartoDB_Positron]
        });
		
        // Add a scale control to the lower right corner of the map
        L.control.scale({position:'bottomright'}).addTo(map);

  		// Create popups for mural points. Edit to include attributes in the popup.
        
   		 function infoPopup(feature, layer) {
		  layer.bindPopup(
   		 "<b>Community Resource Name</b>: " + feature.properties["Community Resource Name"] +
   		 "<br><b>Category</b>: " + feature.properties["Category"] +
   		 "<br><b>Location</b>: " + feature.properties["Location"] +
  			"<br><b>City</b>: " + feature.properties["City"] +
 			"<br><b>County</b>: " + feature.properties["County"] +
  		  "<br><b>Website</b>: <a href='" + feature.properties["Website"] + "' target='_blank'>Link</a>" +
   			 "<br><b>Phone Number</b>: " + feature.properties["Phone Number"]
 	 );
}

        // Define the overLays object, for use in the layer control
        var overLays = {
        };        
        
        // Add the Layer Control to the map (baseMaps defined in separate file)
        L.control.layers(baseMaps, overLays, {collapsed: false}).addTo(map);

    </script>

</body>
</html>
